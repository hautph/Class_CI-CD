name: LinuxKit DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install LinuxKit
        run: |
          go install github.com/linuxkit/linuxkit/src/cmd/linuxkit@latest
          # Thêm đường dẫn Go bin vào PATH của GitHub Action
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Lint YAML Config
        # Sử dụng Action chính thức thay vì tự chạy Docker để tránh lỗi pull image
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: devsecops-node.yml
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable

      - name: Security Scan (Trivy)
        # Quét các Image và cấu hình xem có lỗ hổng bảo mật không
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Build LinuxKit Image
        run: |
          # Build hệ thống (Không dùng mật mã theo yêu cầu của bạn)
          linuxkit build devsecops-node.yml

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secure-os-image
          path: |
            devsecops-node*
            !devsecops-node.yml
