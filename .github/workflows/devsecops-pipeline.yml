name: LinuxKit DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install LinuxKit
        run: |
          go install ://github.com
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Lint YAML Config
        run: |
          # Kiểm tra cấu hình YAML có đúng chuẩn không
          docker run --rm -v $(pwd):/data yamllint/yamllint /data/devsecops-node.yml

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          exit-code: '1' # Dừng pipeline nếu phát hiện lỗi bảo mật nghiêm trọng
          severity: 'CRITICAL,HIGH'

      - name: Build LinuxKit Image
        env:
          # Lấy mật khẩu từ GitHub Secrets
          DISK_PASSWORD: ${{ secrets.DISK_ENCRYPTION_KEY }}
        run: |
          linuxkit build devsecops-node.yml

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secure-os-image
          path: devsecops-node*
