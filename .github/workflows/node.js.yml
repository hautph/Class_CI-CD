name: Node.js CI/CD Professional

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    # 1. Lấy code mới nhất từ GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cấu hình Node.js (Dùng bản 20.x LTS cho ổn định trên Windows)
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 24.x
        # Đã bỏ dòng 'cache: npm' để tránh lỗi tar.exe trên Windows

    # 3. Cài đặt các thư viện (Dependencies)
    - name: Install dependencies
      run: npm install

    # 4. Tạo file .env từ GitHub Secrets
    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        Set-Content -Path .env -Value $content

    # 5. Đăng nhập Docker Hub (Dùng Action chính thức để tránh lỗi TTY)
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 6. Triển khai ứng dụng bằng PM2 trên máy local
    - name: Deploy or Restart with PM2
      run: |
        $PM2_PATH = "$env:APPDATA\npm\pm2.cmd"
        
        # Kiểm tra xem app 'class_cicd' đã tồn tại chưa
        $appExists = & $PM2_PATH jlist | ConvertFrom-Json | Where-Object { $_.name -eq "class_cicd" }
        
        if ($appExists) {
            Write-Host "--- Restarting existing app ---"
            & $PM2_PATH restart class_cicd --update-env
        } else {
            Write-Host "--- Starting new app ---"
            # Lưu ý: Thay index.js bằng file chạy chính của bạn (app.js, server.js...)
            & $PM2_PATH start index.js --name class_cicd
        }
        
        # Lưu lại danh sách để tự khởi động khi máy reboot
        & $PM2_PATH save
