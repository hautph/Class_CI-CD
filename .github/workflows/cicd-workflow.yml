name: CICD + NodeJs + Docker + Notification

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # Chạy trực tiếp trên máy Windows của bạn
    runs-on: self-hosted

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v3
      with:
        node-version: 24.x

    - name: Install dependencies
      run: npm install

    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        Set-Content -Path .env -Value $content

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        # Lưu ý: Kiểm tra tên Secret trên GitHub là DOCKER_USERNAME hay DOCKER_HUB_USERNAME
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/class_ci-cd:latest .

    - name: Publish Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/class_ci-cd:latest

    - name: Run Custom Script (Windows compatible)
      run: |
        if (Test-Path ".github/scripts/custom.sh") {
            # Nếu có bash (Git Bash), chạy bằng bash, nếu không thì bỏ qua
            bash .github/scripts/custom.sh
        } else {
            Write-Host "Custom script not found, skipping..."
        }

    - name: Update Docker Container
      run: |
        # Dừng và xóa container cũ nếu tồn tại
        $containerExists = docker ps -a -q --filter "name=class_ci-cd"
        if ($containerExists) {
            docker rm -f class_ci-cd
        }
        
        # Chạy container mới
        # Đảm bảo PORT_RUN_CONTAINER là "3000:3000"
        docker run -d `
          -p ${{ secrets.PORT_RUN_CONTAINER }} `
          --name class_ci-cd `
          ${{ secrets.DOCKER_HUB_USERNAME }}/class_ci-cd:latest

  notification:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Workflow Status: ${{ job.status }}
            Actor: ${{ github.actor }}
            Commit: ${{ github.event.head_commit.message }}
            Link: https://github.com{{ github.repository }}/commit/${{ github.sha }}
