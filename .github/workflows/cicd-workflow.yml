name: CICD + NodeJs + Docker + Notification

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # Chạy trên máy Windows của bạn
    runs-on: self-hosted
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        Set-Content -Path .env -Value $content

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        # Sử dụng đúng tên biến bạn đã tạo trên GitHub
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest .

    - name: Publish Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest

    - name: Update Docker Container
      run: |
        # Lấy giá trị port từ Secret, nếu trống thì dùng mặc định 3000:3000
        $PORT = "${{ secrets.PORT_RUN_CONTAINER }}"
        if (-not $PORT) { $PORT = "3000:3000" }

        # Kiểm tra và xóa container cũ
        $oldContainer = docker ps -a -q --filter "name=class_ci-cd"
        if ($oldContainer) {
            Write-Host "Stopping and removing old container..."
            docker rm -f class_ci-cd
        }
        
        # Chạy container mới
        Write-Host "Starting container on port $PORT..."
        docker run -d `
          -p "$PORT" `
          --name class_ci-cd `
          "${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest"


  notification:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    # Thay đổi ở đây: false sẽ khiến toàn bộ job này bị bỏ qua
    if: false
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Workflow Status: ${{ job.status }}
            Actor: ${{ github.actor }}
            Commit: ${{ github.event.head_commit.message }}
            Link: https://github.com{{ github.repository }}/commit/${{ github.sha }}

