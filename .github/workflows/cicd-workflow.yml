name: Ultimate DevSecOps Pipeline + Docker Compose + Security + Rollback

on:
  push:
    branches: [ "main" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    # 1. SAST: Quét mã nguồn tìm lỗi logic bảo mật
    - name: Static Analysis (njsscan)
      uses: ajinabraham/njsscan-action@master
      with:
        args: '.'

    # 2. SCA: Quét lỗ hổng trong các thư viện npm
    - name: Dependency Scan (npm audit)
      run: npm install && npm audit --audit-level=high

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:${{ github.sha }} .

    # 3. CONTAINER SCAN: Quét lỗ hổng trong Docker Image
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/class_ci-cd:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # Chặn pipeline nếu có lỗi CRITICAL
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Push Image to Docker Hub
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest

  deploy:
    needs: security-and-build
    runs-on: self-hosted
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        if (-not $content) { Write-Error "PROD_ENV secret is missing!" }
        Set-Content -Path .env -Value $content

    - name: Update with Docker Compose (with Backup)
      run: |
        $env:DOCKER_USERNAME = "${{ secrets.DOCKER_USERNAME }}"
        $rawPort = "${{ secrets.PORT_RUN_CONTAINER }}"
        if (-not $rawPort) { $rawPort = "3000:3000" }
        $env:PORT_CONFIG = $rawPort

        Write-Host "📥 Pulling latest image..."
        docker pull "${env:DOCKER_USERNAME}/class_ci-cd:latest"

        docker rm -f class_ci-cd_backup 2>$null
        $current = docker ps -a -q --filter "name=class_ci-cd"
        if ($current) {
            Write-Host "📦 Backing up current version..."
            docker rename class_ci-cd class_ci-cd_backup
            docker stop class_ci-cd_backup
        }
        
        Write-Host "🚀 Deploying with Docker Compose..."
        docker-compose up -d --force-recreate

    - name: Verify & Auto Rollback
      run: |
        $finalPort = "3000"
        $p = "${{ secrets.PORT_RUN_CONTAINER }}"
        if ($p -match '^(\d+):') { $finalPort = $matches[1] } elseif ($p -as [int]) { $finalPort = $p }

        $url = "http://localhost:$($finalPort)/health"
        Write-Host "🔍 Smart Check: Detecting app at $url"
        Start-Sleep -s 12

        $success = $false
        for ($i=1; $i -le 3; $i++) {
            try {
                Write-Host "📡 Attempt $($i): Checking health..."
                $resp = Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 5
                if ($resp.status -eq "UP") {
                    Write-Host "✅ [SUCCESS] App is healthy!"
                    $success = $true; break
                }
            } catch {
                Write-Host "⚠️ Attempt $($i) - Not ready yet..."
                Start-Sleep -s 5
            }
        }

        if (-not $success) {
            Write-Error "❌ Health check FAILED! Rolling back..."
            docker-compose down
            $hasBackup = docker ps -a -q --filter "name=class_ci-cd_backup"
            if ($hasBackup) {
                docker rename class_ci-cd_backup class_ci-cd
                docker start class_ci-cd
            }
            exit 1
        } else {
            docker rm -f class_ci-cd_backup 2>$null
        }

    # 4. DAST: Chạy OWASP ZAP Baseline Scan (Bản sửa lỗi đường dẫn Windows)
    - name: Run OWASP ZAP Baseline Scan (Container)
      run: |
        $finalPort = "3000"
        $p = "${{ secrets.PORT_RUN_CONTAINER }}"
        if ($p -match '^(\d+):') { $finalPort = $matches[1] } elseif ($p -as [int]) { $finalPort = $p }
        
        Write-Host "🛡️ Starting DAST Scan on http://localhost:$($finalPort) ..."
        
        # SỬA LẠI LỆNH: Thêm tham số -r để chỉ định tên báo cáo hoặc bỏ qua việc ghi file
        # Sử dụng host.docker.internal để container ZAP thấy máy Windows
        docker run --rm `
          ghcr.io/zaproxy/zaproxy:stable zap-baseline.py `
          -t "http://host.docker.internal:$($finalPort)" `
          -I
      shell: pwsh
      continue-on-error: true # Đảm bảo workflow vẫn xanh nếu ZAP tìm thấy lỗi bảo mật


    - name: Docker Retention Policy (Cleanup)
      if: always()
      run: |
        $ErrorActionPreference = "SilentlyContinue"
        docker image prune -f
        $runningImageId = docker ps --filter "name=class_ci-cd" --format "{{.Image}}"
        $repo = "${{ secrets.DOCKER_USERNAME }}/class_ci-cd"
        $oldImages = docker images --filter "reference=$repo" --format "{{.ID}}" | 
                     Where-Object { $_ -ne $runningImageId } | Select-Object -Skip 3
        if ($oldImages) { foreach ($id in $oldImages) { try { docker rmi -f $id } catch {} } }
        exit 0

  notification:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            🚀 <b>Workflow:</b> ${{ github.workflow }}
            📊 <b>Status:</b> ${{ job.status }}
            📝 <b>Commit:</b> ${{ github.event.head_commit.message }}
            🔗 <a href="https://github.com{{ github.repository }}/commit/${{ github.sha }}">View Changes</a>
