name: Enterprise CICD + NodeJs + Docker + HealthCheck

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # Chạy trên máy Windows (Self-hosted Runner)
    runs-on: self-hosted
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    # 1. Kiểm tra môi trường Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    # 2. Cài đặt và Kiểm tra Code (Linting - Giúp code sạch hơn)
    - name: Install & Lint
      run: |
        npm install
        # Nếu bạn có eslint, hãy bật dòng dưới:
        # npm run lint 

    # 3. Tạo file cấu hình bảo mật .env
    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        if (-not $content) { Write-Error "PROD_ENV secret is missing!" }
        Set-Content -Path .env -Value $content

    # 4. Đăng nhập Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Build và Push Image (Gắn tag theo SHA của commit để dễ rollback)
    - name: Build & Push Docker Image
      run: |
        $IMAGE_NAME = "${{ secrets.DOCKER_USERNAME }}/class_ci-cd"
        docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
        docker push $IMAGE_NAME:latest
        docker push $IMAGE_NAME:${{ github.sha }}

    # 6. Triển khai Container trên máy Windows
    - name: Update Docker Container
      run: |
        $PORT = "${{ secrets.PORT_RUN_CONTAINER }}"
        if (-not $PORT) { $PORT = "3000:3000" }
        $IMAGE = "${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest"

        # Dọn dẹp container cũ an toàn bằng PowerShell
        $oldContainer = docker ps -a -q --filter "name=class_ci-cd"
        if ($oldContainer) {
            Write-Host "Stopping and removing old container..."
            docker rm -f class_ci-cd
        }
        
        # Chạy container với chế độ tự khởi động lại (Restart Policy)
        Write-Host "Deploying new container on port $PORT..."
        docker run -d `
          -p "$PORT" `
          --name class_ci-cd `
          --restart always `
          "$IMAGE"

    # 7. Health Check (Đợi app khởi động và kiểm tra xem có sống không)
    - name: Verify Deployment (Health Check)
      run: |
        # Đợi 5 giây cho app khởi động hẳn
        Start-Sleep -s 5
        $LOCAL_PORT = ("${{ secrets.PORT_RUN_CONTAINER }}".Split(':')[0])
        if (-not $LOCAL_PORT) { $LOCAL_PORT = "3000" }
        
        Write-Host "Checking health at http://localhost:$LOCAL_PORT/health ..."
        try {
            $response = Invoke-WebRequest -Uri "http://localhost:$LOCAL_PORT/health" -UseBasicParsing
            if ($response.StatusCode -eq 200) {
                Write-Host "✅ App is UP and Running!"
            } else {
                throw "❌ App returned status $($response.StatusCode)"
            }
        } catch {
            Write-Error "❌ Health check failed! App might be down."
            exit 1
        }

  notification:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    # Vẫn giữ disable theo ý bạn, đổi thành 'always()' để bật lại
    if: false 
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 *Workflow Status:* ${{ job.status }}
            👤 *Actor:* ${{ github.actor }}
            📝 *Commit:* ${{ github.event.head_commit.message }}
            🔗 [View Commit](https://github.com{{ github.repository }}/commit/${{ github.sha }})
          format: markdown
