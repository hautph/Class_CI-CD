name: Enterprise CICD + Docker + Auto Rollback

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        if (-not $content) { Write-Error "PROD_ENV secret is missing!" }
        Set-Content -Path .env -Value $content

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Docker Image
      run: |
        $repo = "${{ secrets.DOCKER_USERNAME }}/class_ci-cd"
        docker build -t "${repo}:latest" -t "${repo}:${{ github.sha }}" .
        docker push "${repo}:latest"
        docker push "${repo}:${{ github.sha }}"

    - name: Update Docker Container (with Backup)
      run: |
        $rawPort = "${{ secrets.PORT_RUN_CONTAINER }}"
        if (-not $rawPort) { $rawPort = "3000:3000" }
        $image = "${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest"

        docker rm -f class_ci-cd_backup 2>$null

        $current = docker ps -a -q --filter "name=class_ci-cd"
        if ($current) {
            Write-Host "📦 Backing up current version..."
            docker rename class_ci-cd class_ci-cd_backup
            docker stop class_ci-cd_backup
        }
        
        Write-Host "🚀 Deploying new version on port $rawPort..."
        docker run -d `
          -p "$rawPort" `
          --name class_ci-cd `
          --restart always `
          "$image"

    - name: Verify & Auto Rollback
      run: |
        $finalPort = "3000"
        $p = "${{ secrets.PORT_RUN_CONTAINER }}"
        if ($p -match '^(\d+):') { $finalPort = $matches[1] } elseif ($p -as [int]) { $finalPort = $p }

        $url = "http://localhost:$finalPort/health"
        $success = $false
        
        Write-Host "🔍 Smart Check: Detecting app at $url"
        Start-Sleep -s 8

        for ($i=1; $i -le 3; $i++) {
            try {
                Write-Host "📡 Attempt $($i): Checking health..."
                $resp = Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 5
                if ($resp.status -eq "UP" -or $resp.message -ne $null) {
                    Write-Host "✅ [SUCCESS] App is healthy!"
                    $success = $true; break
                }
            } catch {
                Write-Host "⚠️ Attempt $($i) - Not ready yet..."
                Start-Sleep -s 4
            }
        }

        if (-not $success) {
            Write-Error "❌ Health check FAILED! Starting Rollback..."
            docker rm -f class_ci-cd
            $hasBackup = docker ps -a -q --filter "name=class_ci-cd_backup"
            if ($hasBackup) {
                Write-Host "♻️ Restoring backup container..."
                docker rename class_ci-cd_backup class_ci-cd
                docker start class_ci-cd
                Write-Host "✅ [ROLLBACK] Previous version restored successfully."
            }
            exit 1
        } else {
            Write-Host "🎉 Deployment stable. Cleaning up backup..."
            docker rm -f class_ci-cd_backup 2>$null
        }

  notification:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 *Workflow:* ${{ github.workflow }}
            📊 *Status:* ${{ job.status }}
            📝 *Commit:* ${{ github.event.head_commit.message }}
            🔗 [View Changes](https://github.com{{ github.repository }}/commit/${{ github.sha }})
          format: markdown
