name: Enterprise CICD + NodeJs + Docker + Smart HealthCheck

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Create .env file
      run: |
        $content = "${{ secrets.PROD_ENV }}"
        if (-not $content) { Write-Error "PROD_ENV secret is missing!" }
        Set-Content -Path .env -Value $content

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Docker Image
      run: |
        # Fix lỗi biến: Sử dụng trực tiếp secret để tạo tên image chuẩn
        $repo = "${{ secrets.DOCKER_USERNAME }}/class_ci-cd"
        Write-Host "Building image: $repo"
        
        # Build với tag latest và SHA commit để dễ rollback
        docker build -t "${repo}:latest" -t "${repo}:${{ github.sha }}" .
        
        Write-Host "Pushing to Docker Hub..."
        docker push "${repo}:latest"
        docker push "${repo}:${{ github.sha }}"

    - name: Update Docker Container
      run: |
        # 1. Xử lý Port an toàn
        $rawPort = "${{ secrets.PORT_RUN_CONTAINER }}"
        if (-not $rawPort) { $rawPort = "3000:3000" }
        
        # 2. Xóa container cũ nếu đang chạy
        $oldContainer = docker ps -a -q --filter "name=class_ci-cd"
        if ($oldContainer) {
            Write-Host "Cleaning up old container..."
            docker rm -f class_ci-cd
        }
        
        # 3. Chạy container mới
        Write-Host "Deploying container on port $rawPort..."
        docker run -d `
          -p "$rawPort" `
          --name class_ci-cd `
          --restart always `
          "${{ secrets.DOCKER_USERNAME }}/class_ci-cd:latest"

    - name: Verify Deployment (Smart Health Check)
      run: |
        # Tìm port ngoài (host port) từ chuỗi "80:3000" hoặc mặc định 3000
        $finalPort = "3000"
        $p = "${{ secrets.PORT_RUN_CONTAINER }}"
        if ($p -match '^(\d+):') { $finalPort = $matches[1] } elseif ($p -as [int]) { $finalPort = $p }

        Write-Host "🔍 Smart Check: Detecting app at http://localhost:$finalPort/health"
        Start-Sleep -s 7 # Đợi app khởi động

        $url = "http://localhost:$finalPort/health"
        $success = $false
        for ($i=1; $i -le 3; $i++) {
            try {
                Write-Host "📡 Attempt $i: Checking $url ..."
                $resp = Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 5
                if ($resp.status -eq "UP" -or $resp.message -ne $null) {
                    Write-Host "✅ [SUCCESS] App is healthy!"
                    $success = $true; break
                }
            } catch {
                Write-Host "⚠️ Not ready yet: $($_.Exception.Message)"
                Start-Sleep -s 3
            }
        }

        if (-not $success) {
            Write-Error "❌ Health check failed!"
            docker logs class_ci-cd --tail 30
            exit 1
        }

  notification:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: false # Đổi thành always() khi muốn bật lại Telegram
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Workflow: ${{ job.status }}
            Actor: ${{ github.actor }}
            Commit: ${{ github.event.head_commit.message }}
            Link: https://github.com{{ github.repository }}/commit/${{ github.sha }}
